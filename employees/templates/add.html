{% extends 'base.html' %}

{% block content %}

<h2>Add Employee</h2>

<form method="POST">
    {% csrf_token %}
    
    <input type="text" name="name" placeholder="Name"><br><br>
    <input type="email" name="email" placeholder="Email"><br><br>
    <input type="number" name="salary" placeholder="Salary"><br><br>

    <button type="submit">Add</button>
</form>

{% endblock %}
